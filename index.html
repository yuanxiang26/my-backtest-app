<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>策略選股-全台股真實回測系統</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-dark: #0a0f1d;
      --card-bg: #121929;
      --panel-bg: #1a233a;
      --accent-blue: #1890ff;
      --accent-red: #ff4d4f;
      --accent-green: #52c41a;
      --text-main: #ffffff;
      --text-sub: #8c9ba5;
      --border-color: #26344d;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-dark); color: var(--text-main); margin: 0; padding: 12px; display: flex; justify-content: center; }
    .app-container { width: 100%; max-width: 480px; background: var(--card-bg); border-radius: 12px; padding: 16px; border: 1px solid var(--border-color); box-sizing: border-box; }
    .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
    .header-title { font-size: 18px; font-weight: bold; }
    .header-btn { color: var(--accent-blue); cursor: pointer; font-size: 14px; }
    .stock-search-box { margin: 12px 0; display: flex; gap: 8px; }
    .stock-input { flex: 1; background: var(--panel-bg); border: 1px solid var(--border-color); color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 14px; }
    .selected-conditions-box { margin: 12px 0; background: var(--panel-bg); border-radius: 8px; padding: 10px; }
    .cond-item { display: flex; justify-content: space-between; align-items: center; background: #101625; border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 12px; margin-bottom: 8px; font-size: 14px; }
    .cond-item:last-child { margin-bottom: 0; }
    .cond-actions { display: flex; gap: 10px; align-items: center; }
    .icon-remove { color: var(--text-sub); cursor: pointer; font-weight: bold; }
    .tab-bar { display: flex; justify-size: space-between; border-bottom: 1px solid var(--border-color); margin-bottom: 12px; }
    .tab-item { padding: 8px 4px; font-size: 14px; color: var(--text-sub); cursor: pointer; position: relative; }
    .tab-item.active { color: var(--accent-blue); font-weight: bold; }
    .tab-item.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--accent-blue); }
    .cond-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .grid-btn { background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: 6px; font-size: 13px; text-align: center; cursor: pointer; }
    .grid-btn.selected { border-color: var(--accent-blue); background: #112a45; color: var(--accent-blue); }
    .backtest-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .control-select { background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-color); padding: 8px; border-radius: 6px; font-size: 13px; outline: none; }
    .sub-controls { display: grid; grid-template-columns: 1fr 1fr 1.5fr 1fr; gap: 8px; margin-bottom: 16px; }
    .dir-btn { background: var(--panel-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px; border-radius: 6px; font-size: 13px; cursor: pointer; text-align: center; }
    .dir-btn.active { background: var(--accent-blue); color: #fff; }
    .btn-exec { background: #d48806; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
    .modal-card { background: #fffbe6; color: #1f1f1f; border-radius: 12px; width: 85%; max-width: 320px; padding: 20px; text-align: center; }
    .modal-title { font-size: 18px; font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid #ffe58f; padding-bottom: 8px; color: #1f1f1f; }
    .modal-body { font-size: 14px; line-height: 1.6; margin-bottom: 16px; color: #434343; text-align: left; }
    .report-box { display: none; background: var(--panel-bg); border-radius: 8px; padding: 12px; margin-top: 16px; }
    .chart-container { height: 160px; width: 100%; margin-bottom: 12px; }
    .report-table { width: 100%; font-size: 13px; border-collapse: collapse; }
    .report-table td { padding: 6px 0; border-bottom: 1px solid var(--border-color); }
    .report-table td:last-child { text-align: right; font-weight: bold; }
    .val-red { color: var(--accent-red); }
    .val-green { color: var(--accent-green); }
  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <span class="header-btn" onclick="location.reload()">&lt; 取消</span>
    <span class="header-title">我的選股 (全台股 API 運算)</span>
    <span class="header-btn">儲存</span>
  </div>

  <div class="stock-search-box">
    <input type="text" id="stockIdInput" class="stock-input" value="2330" placeholder="輸入全台股代碼 (如: 2330, 2317, 2454, 0050)">
  </div>

  <div class="selected-conditions-box">
    <div style="font-size: 12px; color: var(--text-sub); margin-bottom: 8px;" id="condSummary">已選 0 個條件</div>
    <div id="selectedCondList"></div>
  </div>

  <div class="tab-bar">
    <div class="tab-item active" onclick="switchTab('tech')">技術</div>
    <div class="tab-item" onclick="switchTab('chip')">籌碼</div>
    <div class="tab-item" onclick="switchTab('base')">基本</div>
    <div class="tab-item" onclick="switchTab('rank')">排行</div>
    <div class="tab-item" onclick="switchTab('ex')">獨家</div>
  </div>

  <div id="condGrid" class="cond-grid"></div>

  <div class="backtest-controls">
    <select id="takeProfitSelect" class="control-select">
      <option value="0.05">停利5%</option>
      <option value="0.10">停利10%</option>
      <option value="0.15">停利15%</option>
      <option value="0.20">停利20%</option>
      <option value="999">不停利</option>
    </select>
    <select id="stopLossSelect" class="control-select">
      <option value="0.05">停損5%</option>
      <option value="0.10" selected>停損10%</option>
      <option value="0.15">停損15%</option>
      <option value="0.20">停損20%</option>
      <option value="999">不停損</option>
    </select>
    <select id="holdDaysSelect" class="control-select">
      <option value="1">持有1日</option>
      <option value="5">持有5日</option>
      <option value="10" selected>持有10日</option>
      <option value="20">持有20日</option>
      <option value="999">持續持有</option>
    </select>
  </div>

  <div class="sub-controls">
    <div id="btnLong" class="dir-btn active" onclick="setDirection('long')">多方</div>
    <div id="btnShort" class="dir-btn" onclick="setDirection('short')">空方</div>
    <select id="periodSelect" class="control-select">
      <option value="1">回測近一年</option>
      <option value="2">回測近兩年</option>
      <option value="3">回測近三年</option>
      <option value="5" selected>回測近五年</option>
    </select>
    <button class="btn-exec" id="btnExec" onclick="startRealBacktest()">回測</button>
  </div>

  <div id="reportBox" class="report-box">
    <div style="font-size: 12px; color: var(--text-sub); margin-bottom: 4px;">真實報酬走勢</div>
    <div class="chart-container">
      <canvas id="returnChart"></canvas>
    </div>
    <table class="report-table">
      <tr><td>交易次數</td><td id="resTrades">0</td></tr>
      <tr><td>勝率</td><td id="resWinRate" class="val-red">0.00%</td></tr>
      <tr><td>總報酬率</td><td id="resTotalReturn" class="val-red">0.00%</td></tr>
      <tr><td>平均報酬率</td><td id="resAvgReturn">0.00%</td></tr>
      <tr><td>最大獲利率</td><td id="resMaxWin" class="val-red">0.00%</td></tr>
      <tr><td>最大連續獲利率</td><td id="resMaxSeqWin" class="val-red">0.00%</td></tr>
      <tr><td>最大虧損率</td><td id="resMaxLoss" class="val-green">0.00%</td></tr>
    </table>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal-card">
    <div class="modal-title">完成回測</div>
    <div class="modal-body" id="modalText"></div>
    <button style="background: var(--accent-blue); color: #fff; border: none; padding: 8px 24px; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="closeModal()">確定</button>
  </div>
</div>

<!-- 關鍵：導入外部 app.js -->
<script src="app.js"></script>
</body>
</html>
